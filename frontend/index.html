    const canView    = canDo(permissions, session.rol, 'solicitudes', 'ver');
    const canApprove = canDo(permissions, session.rol, 'solicitudes', 'aprobar');

    const loadData = useCallback(async () => {
        setLoading(true);
        try { setSolicitudes(await api.get('/solicitudes')); }
        catch (err) { showToast(err.message, 'error'); }
        finally { setLoading(false); }
    }, [showToast]);

    useEffect(() => { loadData(); }, [loadData]);

    const tabMap = { "Pendientes":"Pendiente", "En Revisión":"En Revisión", "En Cotización":"En Cotización", "En Aprobación":"En Aprobación", "Aprobadas":"Aprobado", "Rechazadas":"Rechazado" };
    const tabs = ["Todas","Pendientes","En Revisión","En Cotización","En Aprobación","Aprobadas","Rechazadas"];

    const filtered = useMemo(() => solicitudes.filter(s => {
        const matchTab = tab==="Todas" || s.estado===tabMap[tab];
        const q = search.toLowerCase();
        const matchQ = !q || s.codigo?.includes(q) || s.descripcion?.toLowerCase().includes(q) || s.solicitante?.toLowerCase().includes(q);
        return matchTab && matchQ;
    }), [solicitudes, tab, search]);

    const totalPages = Math.max(1, Math.ceil(filtered.length/perPage));
    const pageRows = filtered.slice((page-1)*perPage, page*perPage);
    useEffect(() => { if (page>totalPages) setPage(1); }, [filtered,page,totalPages]);

    function openNew(){ setEditing({ descripcion:'', memo_justificativo:'', archivo:null }); setShowForm(true); }
    function openEdit(s){ setEditing({ ...s, archivo:null }); setShowForm(true); }

    async function save(form, isNew){
        try {
            const fd = new FormData();
            fd.append('descripcion', form.descripcion);
            fd.append('memo_justificativo', form.memo_justificativo || '');
            if (form.estado) fd.append('estado', form.estado);
            if (form.archivo) fd.append('archivo', form.archivo);
            if (isNew) { await api.upload('/solicitudes', fd); showToast('Solicitud creada'); }
            else       { await api.uploadPut(`/solicitudes/${form.codigo || form.id_solicitud}`, fd); showToast('Solicitud actualizada'); }
            setShowForm(false); setEditing(null); loadData();
        } catch (err) { showToast(err.message, 'error'); }
    }
    async function doDelete(s){
        try { await api.delete(`/solicitudes/${s.codigo || s.id_solicitud}`); showToast('Solicitud eliminada', 'error'); setConfirmDel(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); }
    }
    async function deleteFile(s){
        if (!confirm('¿Eliminar el archivo adjunto?')) return;
        try { await api.delete(`/solicitudes/${s.codigo || s.id_solicitud}/archivo`); showToast('Archivo eliminado'); loadData(); if(viewing && viewing.id_solicitud === s.id_solicitud) setViewing({...viewing, archivo_adjunto:null}); }
        catch (err) { showToast(err.message, 'error'); }
    }
    async function aprobar(s, observaciones=''){
        try { await api.post(`/solicitudes/${s.codigo}/aprobar`, { observaciones }); showToast('Solicitud aprobada y enviada a cotización'); setConfirmAction(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); setConfirmAction(null); }
    }
    async function rechazar(s, observaciones=''){
        try { await api.post(`/solicitudes/${s.codigo}/rechazar`, { observaciones }); showToast('Solicitud rechazada', 'error'); setConfirmAction(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); setConfirmAction(null); }
    }

    if (loading) return <LoadingPane/>;

    if (!canList && canAdd) {
        // Vista para Personal Designado / Presidente: tabla con búsqueda + filtros + botón "Nueva Solicitud" (modal)
        const filteredMias = solicitudes.filter(s => {
            const matchTab = tab==="Todas" || s.estado===tabMap[tab];
            const q = search.toLowerCase();
            const matchQ = !q || s.codigo?.toLowerCase().includes(q) || s.descripcion?.toLowerCase().includes(q) || formatDate(s.fecha_solicitud).toLowerCase().includes(q);
            return matchTab && matchQ;
        });
        const totalP = Math.max(1, Math.ceil(filteredMias.length/perPage));
        const rowsP = filteredMias.slice((page-1)*perPage, page*perPage);
        return (<>
            {/* Tarjetas resumen estilo simple */}
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
                <div className="bg-white rounded-lg p-4 border border-gray-100 text-center">
                    <p className="text-xs text-gray-500 uppercase font-medium">Total</p>
                    <p className="text-2xl font-bold text-gray-800">{solicitudes.length}</p>
                </div>
                <div className="bg-white rounded-lg p-4 border border-gray-100 text-center">
                    <p className="text-xs text-gray-500 uppercase font-medium">Pendientes</p>
                    <p className="text-2xl font-bold" style={{color:"#f59e0b"}}>{solicitudes.filter(s=>s.estado==='Pendiente').length}</p>
                </div>
                <div className="bg-white rounded-lg p-4 border border-gray-100 text-center">
                    <p className="text-xs text-gray-500 uppercase font-medium">Aprobadas</p>
                    <p className="text-2xl font-bold" style={{color:"#22c55e"}}>{solicitudes.filter(s=>s.estado==='Aprobado').length}</p>
                </div>
                <div className="bg-white rounded-lg p-4 border border-gray-100 text-center">
                    <p className="text-xs text-gray-500 uppercase font-medium">Rechazadas</p>
                    <p className="text-2xl font-bold" style={{color:"#ef4444"}}>{solicitudes.filter(s=>s.estado==='Rechazado').length}</p>
                </div>
            </div>

            <div className="flex items-center gap-2 mb-5 flex-wrap">
                {tabs.map(t => <button key={t} className={"tab-btn "+(tab===t?"active":"")} onClick={()=>setTab(t)}>{t}</button>)}
            </div>
            <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                <div className="flex items-center justify-between p-5 border-b border-gray-100">
                    <div className="flex-1 max-w-md"><SearchField value={search} onChange={setSearch} placeholder="Buscar por #, descripción o fecha..."/></div>
                    <button onClick={openNew} className="flex items-center gap-2 text-blue-700 font-semibold hover:underline">
                        <Ico.newFile width="20" height="20"/><span>Nueva Solicitud</span>
                    </button>
                </div>
                <table className="tbl">
                    <thead><tr><th>#</th><th>Descripción</th><th>Estado</th><th>Fecha</th><th className="text-center">Acciones</th></tr></thead>
                    <tbody>
                        {rowsP.map(s => (
                            <tr key={s.id_solicitud}>
                                <td className="font-medium text-gray-600">{s.codigo}</td>
                                <td className="text-gray-800">{s.descripcion}</td>
                                <td><span className={"badge "+stateBadge(s.estado)}>{s.estado}</span></td>
                                <td className="text-gray-600">{formatDate(s.fecha_solicitud)}</td>
                                <td>
                                    <div className="flex items-center justify-center">
                                        <button className="action-icon" title="Ver" onClick={()=>setViewing(s)}><Ico.eye width="16" height="16" className="text-gray-600"/></button>
                                    </div>
                                </td>
                            </tr>
                        ))}
                        {rowsP.length===0 && <tr><td colSpan="5" className="text-center py-10 text-gray-400">{search || tab!=='Todas' ? 'Sin resultados' : 'Aún no has creado solicitudes'}</td></tr>}
                    </tbody>
                </table>
                <Pagination page={page} total={totalP} onChange={setPage}/>
            </div>
            {showForm && editing && <SolicitudForm value={editing} onCancel={()=>{setShowForm(false);setEditing(null);}} onSave={(f) => save(f, !f.codigo)} onDeleteFile={deleteFile} session={session}/>}
            {viewing && <SolicitudView s={viewing} onClose={()=>setViewing(null)} onDeleteFile={() => { deleteFile(viewing); }}/>}
        </>);
    }

    return (<>
        <div className="flex items-center gap-2 mb-5 flex-wrap">
            {tabs.map(t => <button key={t} className={"tab-btn "+(tab===t?"active":"")} onClick={()=>setTab(t)}>{t}</button>)}
        </div>
        <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
            <div className="flex items-center justify-between p-5 border-b border-gray-100">
                <div className="flex-1 max-w-md"><SearchField value={search} onChange={setSearch} placeholder="Buscar..."/></div>
                {canAdd && (
                    <button onClick={openNew} className="flex items-center gap-2 text-blue-700 font-semibold hover:underline">
                        <Ico.newFile width="20" height="20"/><span>Nueva Solicitud</span>
                    </button>
                )}
            </div>
            <table className="tbl">
                <thead><tr><th>ID</th><th>Descripción</th><th>Solicitante</th><th>Estado</th><th>Fecha</th><th className="text-center">Acciones</th></tr></thead>
                <tbody>
                    {pageRows.map(s => (
                        <tr key={s.id_solicitud}>
                            <td className="font-medium text-gray-600">{s.codigo}</td>
                            <td className="font-medium text-gray-800">{s.descripcion}</td>
                            <td className="text-gray-600">{s.solicitante}</td>
                            <td><span className={"badge "+stateBadge(s.estado)}>{s.estado}</span></td>
                            <td className="text-gray-600">{formatDate(s.fecha_solicitud)}</td>
                            <td>
                                <div className="flex items-center justify-center">
                                    {canView && <button className="action-icon" title="Ver" onClick={()=>setViewing(s)}><Ico.eye width="16" height="16" className="text-gray-600"/></button>}
                                    {canApprove && s.estado === 'Pendiente' && (
                                        <>
                                            <button className="action-icon" title="Aprobar" onClick={()=>setConfirmAction({type:'aprobar', s})}><Ico.check width="16" height="16" style={{color:"#10b981"}}/></button>
                                            <button className="action-icon" title="Rechazar" onClick={()=>setConfirmAction({type:'rechazar', s})}><Ico.x width="16" height="16" style={{color:"#ef4444"}}/></button>
                                        </>
                                    )}
                                    {canEdit && <button className="action-icon" title="Editar" onClick={()=>openEdit(s)}><Ico.edit2 width="16" height="16" className="text-gray-600"/></button>}
                                    {canDelete && <button className="action-icon" title="Eliminar" onClick={()=>setConfirmDel(s)}><Ico.trash width="16" height="16" className="text-gray-600"/></button>}
                                </div>
                            </td>
                        </tr>
                    ))}
                    {pageRows.length===0 && <tr><td colSpan="6" className="text-center py-10 text-gray-400">Sin resultados</td></tr>}
                </tbody>
            </table>
            <Pagination page={page} total={totalPages} onChange={setPage}/>
        </div>
        {showForm && editing && <SolicitudForm value={editing} onCancel={()=>{setShowForm(false);setEditing(null);}} onSave={(f) => save(f, !f.codigo)} onDeleteFile={deleteFile}/>}
        {viewing && <SolicitudView s={viewing} onClose={()=>setViewing(null)} onDeleteFile={() => { deleteFile(viewing); }}/>}
        {confirmDel && <ConfirmDialog title="Eliminar Solicitud" msg={`¿Eliminar la solicitud #${confirmDel.codigo}?`} onCancel={()=>setConfirmDel(null)} onConfirm={()=>doDelete(confirmDel)}/>}
        {confirmAction && (
            <ApproveDialog 
                title={confirmAction.type==='aprobar' ? 'Aprobar Solicitud' : 'Rechazar Solicitud'}
                msg={confirmAction.type==='aprobar' 
                    ? `¿Aprobar la solicitud #${confirmAction.s.codigo}? Se enviará al módulo de Cotización.`
                    : `¿Rechazar la solicitud #${confirmAction.s.codigo}?`}
                isReject={confirmAction.type==='rechazar'}
                onCancel={()=>setConfirmAction(null)}
                onConfirm={(obs)=>confirmAction.type==='aprobar' ? aprobar(confirmAction.s, obs) : rechazar(confirmAction.s, obs)}
            />
        )}
    </>);
}

function SolicitudForm({ value, onCancel, onSave, onDeleteFile, session }){
    const [f, setF] = useState(value);
    const isNew = !f.codigo;
    const set = (k,v) => setF(p => ({...p, [k]:v}));
    const labelStar = (txt) => <>{txt} <span className="text-red-500">*</span></>;
    const camposValidos = (f.descripcion || '').trim() !== '' && (f.memo_justificativo || '').trim() !== '';
    function submit(e){
        e.preventDefault();
        if (!camposValidos) return;
        onSave(f);
    }
    return (
        <div className="modal-backdrop">
            <div className="modal-card">
                <div className="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 className="text-lg font-semibold text-gray-800">{isNew?"Nueva Solicitud":"Editar Solicitud"}</h3>
                    <button onClick={onCancel} className="text-gray-400 hover:text-gray-700"><Ico.close width="20" height="20"/></button>
                </div>
                <form onSubmit={submit} className="p-5 space-y-3">
                    <Field label={labelStar("Descripción")}><input value={f.descripcion||''} onChange={e=>set("descripcion",e.target.value)} className="input-base" required placeholder="Ej: Impresora Láser"/></Field>
                    {!isNew && (
                        <Field label="Estado">
                            <select value={f.estado} onChange={e=>set("estado",e.target.value)} className="input-base">
                                <option>Pendiente</option><option>En Revisión</option><option>En Cotización</option><option>En Aprobación</option><option>Aprobado</option><option>Rechazado</option>
                            </select>
                        </Field>
                    )}
                    <Field label={labelStar("MEMO Justificativo")}><textarea rows="4" value={f.memo_justificativo||''} onChange={e=>set("memo_justificativo",e.target.value)} className="input-base" required placeholder="Justifique la necesidad de este recurso..."/></Field>
                    <Field label="Adjuntar archivo (opcional - PDF, imagen, Excel)">
                        {f.archivo_adjunto && !f.archivo ? (
                            <div className="file-chip">
                                <Ico.paperclip width="16" height="16"/>
                                <a href={`${API_URL}/${f.archivo_adjunto}`} target="_blank" className="hover:underline">Archivo actual</a>
                                <button type="button" className="file-chip-delete" onClick={()=>{ onDeleteFile(f); set('archivo_adjunto', null); }} title="Eliminar archivo">
                                    <Ico.trash width="14" height="14"/>
                                </button>
                            </div>
                        ) : (
                            <div className="flex items-center gap-3 border border-gray-300 rounded-md p-2">
                                <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" onChange={e=>set("archivo",e.target.files[0])} className="text-sm flex-1"/>
                                <Ico.upload width="18" height="18" className="text-gray-500"/>
                            </div>
                        )}
                    </Field>
                    {!camposValidos && (
                        <p className="text-xs text-red-500 text-center">⚠ Complete los campos marcados con <span className="text-red-500 font-bold">*</span></p>
                    )}
                    <div className="flex items-center gap-3 pt-3">
                        <button type="button" onClick={onCancel} className="flex-1 btn-outline">Cancelar</button>
                        <button type="submit" disabled={!camposValidos} className="flex-1 btn-primary justify-center" style={!camposValidos ? {opacity:0.5, cursor:'not-allowed'} : {}}>Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    );
}

function SolicitudInline({ onSave, session }){
    const [f, setF] = useState({ descripcion:'', memo_justificativo:'', archivo:null });
    const set = (k,v) => setF(p => ({...p, [k]:v}));
    function submit(e){ e.preventDefault(); if(!f.descripcion) return; onSave(f); setF({ descripcion:'', memo_justificativo:'', archivo:null }); }
    return (
        <form onSubmit={submit} className="space-y-4 max-w-2xl">
            <Field label="Descripción"><input value={f.descripcion} onChange={e=>set("descripcion",e.target.value)} className="input-base" required placeholder="Ej: Impresora Láser"/></Field>
            <Field label="Solicitante"><input value={session.nombre} disabled className="input-base bg-gray-50"/></Field>
            <Field label="MEMO Justificativo"><textarea rows="5" value={f.memo_justificativo} onChange={e=>set("memo_justificativo",e.target.value)} className="input-base"/></Field>
            <Field label="Adjuntar archivo (opcional)">
                <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onChange={e=>set("archivo",e.target.files[0])} className="input-base text-sm"/>
            </Field>
            <button type="submit" className="btn-primary">Enviar Solicitud</button>
        </form>
    );
}

function ApproveDialog({ title, msg, isReject, onCancel, onConfirm }){
    const [obs, setObs] = useState('');
    return (
        <div className="modal-backdrop">
            <div className="modal-card" style={{maxWidth:480}}>
                <div className="p-6">
                    <div className={"w-12 h-12 rounded-full flex items-center justify-center mb-4 mx-auto "+(isReject?"bg-red-50":"bg-green-50")}>
                        {isReject 
                            ? <Ico.xsquare width="22" height="22" className="text-red-500"/>
                            : <Ico.check2 width="22" height="22" className="text-green-500"/>}
                    </div>
                    <h3 className="text-lg font-semibold text-gray-800 mb-2 text-center">{title}</h3>
                    <p className="text-sm text-gray-600 text-center mb-4">{msg}</p>
                    <Field label={isReject?"Motivo del rechazo":"Observaciones (opcional)"}>
                        <textarea rows="3" value={obs} onChange={e=>setObs(e.target.value)} className="input-base" placeholder={isReject?"Indique el motivo...":"Comentarios sobre la aprobación..."}/>
                    </Field>
                    <div className="flex items-center gap-3 mt-4">
                        <button onClick={onCancel} className="flex-1 btn-outline">Cancelar</button>
                        <button onClick={()=>onConfirm(obs)} className="flex-1 py-2.5 px-4 rounded-md font-medium text-white" style={{background:isReject?"#ef4444":"#10b981"}}>
                            {isReject ? 'Rechazar' : 'Aprobar'}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );
}

function GestionCotizaciones({ session, permissions, subRoute, setSubRoute, showToast }){
    const [cotizaciones, setCotizaciones] = useState([]);
    const [solicitudes, setSolicitudes] = useState([]);
    const [proveedores, setProveedores] = useState([]);
    const [stats, setStats] = useState({ en_espera:0, pendientes:0, en_proceso:0, aprobados:0, total:0 });
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState('');
    const [filterEst, setFilterEst] = useState('');
    const [selected, setSelected] = useState(null);
    const [selectedDetail, setSelectedDetail] = useState(null);
    const [elaborando, setElaborando] = useState(null); // cotización "En Espera" a elaborar
    const [page, setPage] = useState(1);
    const perPage = 6;

    const canElaborar = canDo(permissions, session.rol, 'cotizacion', 'elaborar');
    const canAprobar  = canDo(permissions, session.rol, 'cotizacion', 'aprobar');

    const loadData = useCallback(async () => {
        setLoading(true);
        try {
            const [cs, st, sols, provs] = await Promise.all([
                api.get('/cotizaciones'), api.get('/cotizaciones/stats'),
                api.get('/solicitudes').catch(()=>[]), api.get('/proveedores').catch(()=>[])
            ]);
            setCotizaciones(cs); setStats(st); setSolicitudes(sols); setProveedores(provs);
        } catch (err) { showToast(err.message, 'error'); }
        finally { setLoading(false); }
    }, [showToast]);

    useEffect(() => { loadData(); }, [loadData]);

    useEffect(() => {
        if (selected) api.get(`/cotizaciones/${selected.codigo}`).then(setSelectedDetail).catch(() => setSelectedDetail(null));
        else setSelectedDetail(null);
    }, [selected]);

    const filtered = useMemo(() => cotizaciones.filter(c => {
        const matchEst = !filterEst || c.estado === filterEst;
        const q = search.toLowerCase();
        const matchQ = !q || c.codigo?.toLowerCase().includes(q) || c.descripcion?.toLowerCase().includes(q) || c.nombre_proveedor?.toLowerCase().includes(q);
        return matchEst && matchQ;
    }), [cotizaciones, filterEst, search]);

    const totalPages = Math.max(1, Math.ceil(filtered.length/perPage));
    const pageRows = filtered.slice((page-1)*perPage, page*perPage);
    useEffect(() => { if (page>totalPages) setPage(1); }, [filtered,page,totalPages]);

    async function aprobarCot(c){
        try { await api.post(`/cotizaciones/${c.codigo}/aprobar`); showToast('Cotización aprobada. Enviada al Presidente.'); loadData(); }
        catch (err) { showToast(err.message, 'error'); }
    }
    async function descargarPDF(c){
        try {
            const token = api.getToken();
            const res = await fetch(`${API_URL}/api/cotizaciones/${c.codigo}/pdf`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error('Error al descargar PDF');
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${c.codigo}.pdf`; a.click();
            URL.revokeObjectURL(url);
            showToast('PDF descargado');
        } catch (err) { showToast(err.message, 'error'); }
    }

    if (loading) return <LoadingPane/>;

    if (elaborando) {
        return <ElaborarCotizacion 
            cotEspera={elaborando}
            session={session} 
            proveedores={proveedores}
            solicitudes={solicitudes}
            onCancel={()=>setElaborando(null)}
            onSave={async (payload) => {
                try { 
                    await api.post(`/cotizaciones/${elaborando.codigo}/elaborar`, payload); 
                    showToast('Cotización elaborada'); 
                    setElaborando(null); 
                    loadData(); 
                } catch (err) { showToast(err.message, 'error'); }
            }}/>;
    }

    return (
        <div className="grid grid-cols-12 gap-5">
            <div className="col-span-12 lg:col-span-9">
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-5">
                    <StatCardSmall icon={<Ico.hourglass width="24" height="24" style={{color:"#9a3412"}}/>} bg="#fed7aa" val={stats.en_espera||0} label="En Espera" color="#9a3412"/>
                    <StatCardSmall icon={<Ico.refresh width="24" height="24" style={{color:"#3b82f6"}}/>} bg="#dbeafe" val={stats.en_proceso||0} label="En Proceso" color="#3b82f6"/>
                    <StatCardSmall icon={<Ico.check2 width="24" height="24" style={{color:"#10b981"}}/>} bg="#d1fae5" val={stats.aprobados||0} label="Aprobados" color="#10b981"/>
                    <StatCardSmall icon={<Ico.suitcase width="24" height="24" style={{color:"#6b7280"}}/>} bg="#f3f4f6" val={stats.total||0} label="Total" color="#6b7280"/>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <SelectField value={filterEst} onChange={setFilterEst} options={[{v:"",l:"Todos los estados"},{v:"En Espera",l:"En Espera"},{v:"Pendiente",l:"Pendiente"},{v:"En Proceso",l:"En Proceso"},{v:"Aprobada",l:"Aprobada"}]}/>
                    <SearchField value={search} onChange={setSearch} placeholder="Buscar..."/>
                    <div></div>
                </div>
                <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                    <table className="tbl">
                        <thead><tr><th>ID Cot.</th><th>Solicitud</th><th>Descripción</th><th>Proveedor</th><th>Total (USD)</th><th>Estado</th><th className="text-center">Acciones</th></tr></thead>
                        <tbody>
                            {pageRows.map(c => (
                                <tr key={c.id_cotizacion} className={selected?.id_cotizacion===c.id_cotizacion ? "bg-blue-50":""}>
                                    <td className="font-medium">{c.codigo}</td>
                                    <td>{c.codigo_solicitud}</td>
                                    <td className="font-medium text-gray-800">{c.descripcion}</td>
                                    <td className="font-medium">{c.nombre_proveedor || (c.estado==='En Espera'?'(Pendiente)':'—')}</td>
                                    <td className="font-medium">{c.estado==='En Espera' ? '—' : '$'+parseFloat(c.total_usd||0).toLocaleString()}</td>
                                    <td><span className={"badge "+stateBadge(c.estado)}>{c.estado}</span></td>
                                    <td>
                                        <div className="flex items-center justify-center">
                                            {c.estado === 'En Espera' && canElaborar ? (
                                                <button className="px-3 py-1.5 rounded-md text-xs font-medium text-white" style={{background:"#9a3412"}} onClick={()=>setElaborando(c)}>
                                                    Elaborar
                                                </button>
                                            ) : (
                                                <button className="action-icon" title="Ver" onClick={()=>setSelected(c)}><Ico.eye width="16" height="16" className="text-gray-600"/></button>
                                            )}
                                        </div>
                                    </td>
                                </tr>
                            ))}
                            {pageRows.length===0 && <tr><td colSpan="7" className="text-center py-10 text-gray-400">Sin resultados</td></tr>}
                        </tbody>
                    </table>
                    <Pagination page={page} total={totalPages} onChange={setPage}/>
                </div>
            </div>
            <div className="col-span-12 lg:col-span-3">
                {selectedDetail ? (
                    <div className="detail-panel">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="font-semibold text-gray-800">Detalle de la Cotización</h3>
                            <button onClick={()=>setSelected(null)} className="text-gray-400 hover:text-gray-700"><Ico.close width="18" height="18"/></button>
                        </div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Solicitud:</span><span className="badge badge-pendiente">{selectedDetail.codigo_solicitud}</span></div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Descripción:</span><span className="text-sm font-medium text-gray-800 text-right">{selectedDetail.descripcion}</span></div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Estado:</span><span className={"badge "+stateBadge(selectedDetail.estado)}>{selectedDetail.estado}</span></div>
                        <div className="flex justify-between items-center mb-4"><span className="text-sm text-gray-500">Fecha:</span><span className="text-sm font-medium text-gray-800">{formatDate(selectedDetail.fecha_cotizacion)}</span></div>
                        {selectedDetail.detalles && selectedDetail.detalles.length > 0 && (
                            <div className="border-t pt-3 mb-3">
                                <h4 className="text-sm font-semibold text-gray-700 mb-2">Proveedores</h4>
                                <table className="w-full text-xs">
                                    <thead><tr className="text-gray-500"><th className="text-left font-normal">Prov.</th><th className="text-left font-normal">Precio</th><th className="text-left font-normal">Sel.</th></tr></thead>
                                    <tbody>
                                        {selectedDetail.detalles.map((d,i) => (
                                            <tr key={i} className="border-t border-gray-100">
                                                <td className="py-1.5 font-medium">{d.nombre_proveedor}</td>
                                                <td>${parseFloat(d.precio_usd).toFixed(0)}</td>
                                                <td>{d.seleccionado ? <Ico.check width="14" height="14" style={{color:"#10b981"}}/> : ''}</td>

                                        ))}

                            </div>
                        )}
                        <div className="border-t pt-3 mb-4">

                            <p className="text-xs text-gray-600 bg-gray-50 p-2 rounded">{selectedDetail.memo_justificativo || '—'}</p>
                        </div>
                        {selectedDetail.decision_presidente && (
                            <div className={"border-t pt-3 mb-4 p-3 rounded-lg border-l-4 " + (selectedDetail.decision_presidente === 'Aprobada' ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500')}>

                                </p>

                                    <strong>Por:</strong> {selectedDetail.aprobador_presidente_nombre || '—'}
                                    {selectedDetail.fecha_decision_presidente && <span> · {formatDate(selectedDetail.fecha_decision_presidente)}</span>}
                                </p>
                                {selectedDetail.observaciones_presidente && (
                                    <div className="mt-2 p-2 bg-white rounded border">
                                        <p className="text-xs text-gray-500 font-semibold mb-1">OBSERVACIONES DEL PRESIDENTE:</p>
                                        <p className="text-sm text-gray-800 whitespace-pre-wrap">{selectedDetail.observaciones_presidente}</p>
                                    </div>
                                )}
                            </div>
                        )}
                        <div className="space-y-2">
                            {selectedDetail.estado !== 'En Espera' && (
                                <button onClick={()=>descargarPDF(selectedDetail)} className="btn-outline"><Ico.download width="16" height="16"/> Descargar PDF</button>
                            )}
                            {canAprobar && selectedDetail.estado!=="Aprobada" && selectedDetail.estado!=="En Espera" && (
                                <button onClick={()=>aprobarCot(selectedDetail)} className="w-full py-2.5 px-4 rounded-md text-white font-medium flex items-center justify-center gap-2" style={{background:"var(--azul-principal)"}}>
                                    <Ico.check2 width="18" height="18"/> Aprobar Cotización
                                </button>
                            )}
                        </div>
                    </div>
                ) : (<div className="detail-panel text-center text-sm text-gray-400 py-12">Seleccione una cotización</div>)}
            </div>
        </div>
    );
}

function ElaborarCotizacion({ cotEspera, session, proveedores, solicitudes, onCancel, onSave }){
    const sol = solicitudes.find(s => s.id_solicitud === cotEspera.id_solicitud);
    const [detalles, setDetalles] = useState([]);
    const [memo, setMemo] = useState('');

    useEffect(() => {
        if (proveedores.length >= 1 && detalles.length === 0) {
            // Inicia con solo 1 fila (el usuario añade las que necesite)
            const p = proveedores[0];
            setDetalles([{
                id_proveedor: p.id_proveedor, nombre: p.nombre,
                producto: cotEspera.descripcion, precio_usd: 0, tiempo_entrega: '',
                seleccionado: true
            }]);
        }
    }, [proveedores]);

    const updateRow = (i,k,v) => { const copy = [...detalles]; copy[i] = {...copy[i], [k]:v}; setDetalles(copy); };
    const selectRow = (i) => setDetalles(detalles.map((r,idx) => ({...r, seleccionado: idx===i})));
    const changeProveedor = (i, idProv) => {
        const p = proveedores.find(x => x.id_proveedor === parseInt(idProv));
        if (!p) return;
        const copy = [...detalles]; copy[i] = {...copy[i], id_proveedor: p.id_proveedor, nombre: p.nombre}; setDetalles(copy);
    };
    const addRow = () => {
        if (proveedores.length === 0) return;
        // Sugerir el primer proveedor que no esté ya en la lista
        const usados = new Set(detalles.map(d => d.id_proveedor));
        const sugerido = proveedores.find(p => !usados.has(p.id_proveedor)) || proveedores[0];
        setDetalles([...detalles, {
            id_proveedor: sugerido.id_proveedor, nombre: sugerido.nombre,
            producto: cotEspera.descripcion, precio_usd: 0, tiempo_entrega: '',
            seleccionado: false
        }]);
    };
    const removeRow = (i) => {
        if (detalles.length <= 1) return; // mínimo 1
        const eraSeleccionado = detalles[i].seleccionado;
        let copy = detalles.filter((_, idx) => idx !== i);
        // Si eliminamos el seleccionado, marcamos el primero
        if (eraSeleccionado && copy.length > 0) {
            copy = copy.map((r, idx) => ({...r, seleccionado: idx === 0}));
        }
        setDetalles(copy);
    };

    function save(){
        if (detalles.length === 0) { alert('Debe agregar al menos un proveedor'); return; }
        const sel = detalles.find(d => d.seleccionado);
        if (!sel) { alert('Debe seleccionar un proveedor ganador'); return; }
        if (detalles.some(d => !d.precio_usd || d.precio_usd <= 0)) { alert('Todos los proveedores deben tener un precio mayor a 0'); return; }
        if (detalles.some(d => !(d.producto || '').trim())) { alert('Todos los proveedores deben tener un producto'); return; }
        onSave({ memo_justificativo: memo || 'Sin observaciones', detalles });
    }

    return (
        <div>
            <div className="bg-orange-50 border-l-4 border-orange-400 p-4 mb-5 rounded-r-md">
                <p className="text-sm text-orange-800"><strong>Cotización en espera:</strong> {cotEspera.codigo} — Solicitud #{sol?.codigo || cotEspera.id_solicitud}</p>
                <p className="text-xs text-orange-700 mt-1">Complete el análisis comparativo seleccionando el proveedor ganador.</p>
            </div>
            <h2 className="text-xl font-semibold text-gray-800 mb-1"><strong>Formulario de</strong> <span className="font-normal">Análisis Comparativo</span></h2>
            <p className="text-gray-500 text-sm mb-6">Solicitud: <span className="font-medium">{sol?.descripcion || cotEspera.descripcion}</span></p>
            <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden mb-5">
                <table className="w-full">
                    <thead className="border-b border-gray-100">
                        <tr className="text-gray-500 text-sm">
                            <th className="text-left font-medium py-4 px-4">Proveedor <span className="text-red-500">*</span></th>
                            <th className="text-left font-medium py-4 px-4">Producto <span className="text-red-500">*</span></th>
                            <th className="text-left font-medium py-4 px-4">Precio (USD) <span className="text-red-500">*</span></th>
                            <th className="text-left font-medium py-4 px-4">Entrega</th>
                            <th className="text-center font-medium py-4 px-4">Seleccionar <span className="text-red-500">*</span></th>
                            <th className="text-center font-medium py-4 px-4"></th>
                        </tr>
                    </thead>
                    <tbody>
                        {detalles.map((row,i) => (
                            <tr key={i} className="border-t border-gray-100">
                                <td className="py-3 px-4">
                                    <select value={row.id_proveedor} onChange={e=>changeProveedor(i, e.target.value)} className="bg-transparent border border-gray-200 rounded px-2 py-1 text-sm w-full">
                                        {proveedores.map(p => <option key={p.id_proveedor} value={p.id_proveedor}>{p.nombre}</option>)}
                                    </select>
                                </td>
                                <td className="py-3 px-4"><input value={row.producto} onChange={e=>updateRow(i,"producto",e.target.value)} className="bg-transparent border border-gray-200 rounded px-2 py-1 text-sm w-full"/></td>
                                <td className="py-3 px-4"><input type="number" min="0" step="0.01" value={row.precio_usd} onChange={e=>updateRow(i,"precio_usd",Number(e.target.value))} className="bg-transparent border border-gray-200 rounded px-2 py-1 text-sm w-24"/></td>
                                <td className="py-3 px-4"><input value={row.tiempo_entrega} onChange={e=>updateRow(i,"tiempo_entrega",e.target.value)} className="bg-transparent border border-gray-200 rounded px-2 py-1 text-sm w-full" placeholder="Ej: 3 días"/></td>
                                <td className="py-3 px-4 text-center">
                                    <div onClick={()=>selectRow(i)} className={"w-6 h-6 mx-auto rounded-full border-2 cursor-pointer flex items-center justify-center "+(row.seleccionado?"border-blue-600":"border-gray-300")}>
                                        {row.seleccionado && <div className="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>}
                                    </div>
                                </td>
                                <td className="py-3 px-4 text-center">
                                    {detalles.length > 1 && (
                                        <button type="button" onClick={() => removeRow(i)} title="Quitar proveedor" className="text-red-500 hover:text-red-700 transition">
                                            <Ico.trash width="16" height="16"/>
                                        </button>
                                    )}
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
                <div className="p-4 border-t border-gray-100 bg-gray-50">
                    <button type="button" onClick={addRow} className="flex items-center gap-2 text-blue-700 font-medium text-sm hover:underline">
                        <Ico.plus width="16" height="16"/>
                        <span>Agregar proveedor</span>
                    </button>
                    <p className="text-xs text-gray-500 mt-1">Puede agregar tantos proveedores como necesite para el análisis comparativo.</p>
                </div>
            </div>
            <div className="bg-white rounded-lg shadow-sm border border-gray-100 p-5 mb-5">
                <h3 className="font-semibold text-gray-700 mb-3"><strong>MEMO</strong> <span className="font-normal">Justificativo</span></h3>
                <textarea rows="5" value={memo} onChange={e=>setMemo(e.target.value)} className="input-base" placeholder="Justificación de la selección y detalles relevantes..."/>
                <div className="flex justify-end gap-3 mt-4">
                    <button onClick={onCancel} className="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancelar</button>
                    <button onClick={save} className="btn-primary">Guardar Cotización</button>
                </div>
            </div>
        </div>
    );
}

function GestionRecursos({ session, permissions, showToast }){
    const [recursos, setRecursos] = useState([]);
    const [stats, setStats] = useState({ pendientes:0, en_proceso:0, aprobados:0, rechazados:0, total:0 });
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState('');
    const [filterEst, setFilterEst] = useState('');
    const [selected, setSelected] = useState(null);
    const [confirmAction, setConfirmAction] = useState(null);
    const [page, setPage] = useState(1);
    const perPage = 6;

    const loadData = useCallback(async () => {
        setLoading(true);
        try {
            const [rs, st] = await Promise.all([api.get('/recursos'), api.get('/recursos/stats')]);
            setRecursos(rs); setStats(st);
            if (!selected) setSelected(rs.find(r=>r.estado==='Pendiente') || rs[0] || null);
        } catch (err) { showToast(err.message, 'error'); }
        finally { setLoading(false); }
    }, [showToast]);

    useEffect(() => { loadData(); }, [loadData]);

    const filtered = useMemo(() => recursos.filter(r => {
        const matchEst = !filterEst || r.estado === filterEst;
        const q = search.toLowerCase();
        const matchQ = !q || r.codigo?.toLowerCase().includes(q) || r.descripcion?.toLowerCase().includes(q) || r.solicitante?.toLowerCase().includes(q);
        return matchEst && matchQ;
    }), [recursos, filterEst, search]);

    const totalPages = Math.max(1, Math.ceil(filtered.length/perPage));
    const pageRows = filtered.slice((page-1)*perPage, page*perPage);
    useEffect(() => { if (page>totalPages) setPage(1); }, [filtered,page,totalPages]);

    async function aprobar(r, obs=''){
        try { await api.post(`/recursos/${r.codigo}/aprobar`, { observaciones: obs }); showToast('Recurso aprobado'); setConfirmAction(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); }
    }
    async function rechazar(r, obs=''){
        try { await api.post(`/recursos/${r.codigo}/rechazar`, { observaciones: obs }); showToast('Recurso rechazado', 'error'); setConfirmAction(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); }
    }

    if (loading) return <LoadingPane/>;

    return (
        <div className="grid grid-cols-12 gap-5">
            <div className="col-span-12 lg:col-span-9">
                <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-5">
                    <StatCardSmall icon={<Ico.xsquare width="24" height="24" style={{color:"#ef4444"}}/>} bg="#fee2e2" val={stats.rechazados||0} label="Rechazados" color="#ef4444"/>
                    <StatCardSmall icon={<Ico.hourglass width="24" height="24" style={{color:"#f59e0b"}}/>} bg="#fef3c7" val={stats.pendientes||0} label="Pendientes" color="#f59e0b"/>
                    <StatCardSmall icon={<Ico.check2 width="24" height="24" style={{color:"#10b981"}}/>} bg="#d1fae5" val={stats.aprobados||0} label="Aprobados" color="#10b981"/>
                    <StatCardSmall icon={<Ico.folder width="24" height="24" style={{color:"#06b6d4"}}/>} bg="#cffafe" val={stats.total||0} label="Total" color="#06b6d4"/>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <SelectField value={filterEst} onChange={setFilterEst} options={[{v:"",l:"Todos los estados"},{v:"Pendiente",l:"Pendiente"},{v:"En Proceso",l:"En Proceso"},{v:"Aprobada",l:"Aprobada"},{v:"Rechazada",l:"Rechazada"}]}/>
                    <SearchField value={search} onChange={setSearch} placeholder="Buscar..."/>
                    <div></div>
                </div>
                <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                    <table className="tbl">
                        <thead><tr><th>ID Cot.</th><th>Descripción</th><th>Solicitante</th><th>Total</th><th>Estado</th><th className="text-center">Acciones</th></tr></thead>

                                    <td className="font-medium text-gray-700">{r.solicitante}</td>
                                    <td className="font-medium">${parseFloat(r.total_usd||0).toLocaleString()}</td>
                                    <td><span className={"badge "+stateBadge(r.estado)}>{r.estado}</span></td>
                                    <td>
                                        <div className="flex items-center justify-center">
                                            <button className="action-icon" title="Ver" onClick={()=>setSelected(r)}><Ico.eye width="16" height="16" className="text-gray-600"/></button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                            {pageRows.length===0 && <tr><td colSpan="6" className="text-center py-10 text-gray-400">Sin resultados</td></tr>}
                        </tbody>
                    </table>

                </div>
            </div>
            <div className="col-span-12 lg:col-span-3">
                {selected ? (
                    <div className="detail-panel">
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="font-semibold text-gray-800">Detalle</h3>
                            <button onClick={()=>setSelected(null)} className="text-gray-400 hover:text-gray-700"><Ico.close width="18" height="18"/></button>
                        </div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Cotización:</span><span className="font-medium">{selected.codigo}</span></div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Solicitud:</span><span className="badge badge-pendiente">{selected.codigo_solicitud}</span></div>
                        <div className="flex justify-between items-center mb-2"><span className="text-sm text-gray-500">Descripción:</span><span className="text-sm font-medium text-gray-800">{selected.descripcion}</span></div>
                        <div className="flex justify-between items-center mb-4"><span className="text-sm text-gray-500">Total:</span><span className="font-semibold text-gray-900">${parseFloat(selected.total_usd||0).toLocaleString()}</span></div>
                        <div className="border-t pt-3 mb-3"><p className="text-sm text-gray-500 mb-1">Solicitante:</p><p className="text-sm font-semibold text-gray-800">{selected.solicitante}</p></div>
                        <div className="border-t pt-3 mb-3"><p className="text-sm text-gray-500 mb-1">Proveedor seleccionado:</p><p className="text-sm font-semibold text-gray-800">{selected.proveedor_seleccionado || '—'}</p></div>
                        <div className="border-t pt-3 mb-4">
                            <h4 className="text-sm font-semibold text-gray-700 mb-2">MEMO</h4>
                            <p className="text-xs text-gray-600 whitespace-pre-wrap">{selected.memo_solicitud || selected.memo_justificativo}</p>
                        </div>
                        {selected.decision_presidente && (
                            <div className={"mb-4 p-3 rounded-lg border-l-4 " + (selected.decision_presidente === 'Aprobada' ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500')}>
                                <p className={"text-sm font-bold mb-1 " + (selected.decision_presidente === 'Aprobada' ? 'text-green-700' : 'text-red-700')}>
                                    {selected.decision_presidente === 'Aprobada' ? '✓ Aprobada' : '✗ Rechazada'} por el Presidente
                                </p>
                                <p className="text-xs text-gray-600">
                                    <strong>Por:</strong> {selected.aprobador_presidente_nombre || '—'}
                                    {selected.fecha_decision_presidente && <span> · {formatDate(selected.fecha_decision_presidente)}</span>}
                                </p>
                                {selected.observaciones_presidente && (
                                    <div className="mt-2 p-2 bg-white rounded border">
                                        <p className="text-xs text-gray-500 font-semibold mb-1">OBSERVACIONES DEL PRESIDENTE:</p>
                                        <p className="text-sm text-gray-800 whitespace-pre-wrap">{selected.observaciones_presidente}</p>
                                    </div>
                                )}
                            </div>
                        )}
                        {selected.estado!=='Aprobada' && selected.estado!=='Rechazada' && (
                            <div className="space-y-2">
                                <button onClick={()=>setConfirmAction({type:'rechazar',r:selected})} className="w-full py-2.5 px-4 rounded-md font-medium text-white" style={{background:"#f87171"}}>Rechazar</button>
                                <button onClick={()=>setConfirmAction({type:'aprobar',r:selected})} className="w-full py-2.5 px-4 rounded-md font-medium text-white" style={{background:"#34d399"}}>Aprobar</button>
                            </div>
                        )}
                    </div>
                ) : (<div className="detail-panel text-center text-sm text-gray-400 py-12">Seleccione un recurso</div>)}
            </div>
            {confirmAction && (
                <ApproveDialog 
                    title={confirmAction.type==='aprobar'?'Aprobar Recurso':'Rechazar Recurso'}
                    msg={`¿Confirma que desea ${confirmAction.type} el recurso ${confirmAction.r.codigo}?`}
                    isReject={confirmAction.type==='rechazar'}
                    onCancel={()=>setConfirmAction(null)}
                    onConfirm={(obs)=>confirmAction.type==='aprobar' ? aprobar(confirmAction.r, obs) : rechazar(confirmAction.r, obs)}
                />
            )}
        </div>
    );
}

// ============================================================
// PROVEEDORES v2 - con campos extendidos
// ============================================================
function GestionProveedores({ session, permissions, showToast }){
    const [proveedores, setProveedores] = useState([]);
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState('');
    const [viewing, setViewing] = useState(null);
    const [editing, setEditing] = useState(null);
    const [confirmDel, setConfirmDel] = useState(null);
    const [page, setPage] = useState(1);
    const perPage = 6;

    const canAdd = canDo(permissions, session.rol, 'proveedores', 'agregar');
    const canEdit = canDo(permissions, session.rol, 'proveedores', 'editar');

    const loadData = useCallback(async () => {
        setLoading(true);
        try { setProveedores(await api.get('/proveedores')); }
        catch (err) { showToast(err.message, 'error'); }
        finally { setLoading(false); }
    }, [showToast]);

    useEffect(() => { loadData(); }, [loadData]);

    const filtered = useMemo(() => {
        const q = search.toLowerCase();
        return proveedores.filter(p => !q || p.nombre?.toLowerCase().includes(q) || p.contacto_principal?.toLowerCase().includes(q) || p.email?.toLowerCase().includes(q) || p.categoria?.toLowerCase().includes(q));
    }, [proveedores, search]);

    const totalPages = Math.max(1, Math.ceil(filtered.length/perPage));
    const pageRows = filtered.slice((page-1)*perPage, page*perPage);
    useEffect(() => { if (page>totalPages) setPage(1); }, [filtered,page,totalPages]);

    function openNew(){ setEditing({ nombre:'', rif:'J-', contacto_principal:'', telefono:'', email:'', direccion:'', categoria:'', notas:'' }); }
    async function save(f){
        try {
            if (f.id_proveedor) { await api.put(`/proveedores/${f.id_proveedor}`, f); showToast('Proveedor actualizado'); }
            else                { await api.post('/proveedores', f); showToast('Proveedor agregado'); }
            setEditing(null); loadData();
        } catch (err) { showToast(err.message, 'error'); }
    }
    async function doDelete(p){
        try { await api.delete(`/proveedores/${p.id_proveedor}`); showToast('Proveedor desactivado', 'error'); setConfirmDel(null); loadData(); }
        catch (err) { showToast(err.message, 'error'); }
    }

    if (loading) return <LoadingPane/>;

    return (
        <div className="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
            <div className="p-5 border-b border-gray-100 flex items-center justify-between gap-4 flex-wrap">
                <div className="flex-1 min-w-[200px] max-w-md"><SearchField value={search} onChange={setSearch} placeholder="Buscar proveedor..."/></div>
                {canAdd && (
                    <button onClick={openNew} className="btn-primary"><Ico.plus width="18" height="18"/> Nuevo Proveedor</button>
                )}
            </div>
            <table className="tbl">
                <thead><tr><th>ID</th><th>Nombre</th><th>RIF</th><th>Categoría</th><th>Contacto</th><th>Teléfono</th><th className="text-center">Acciones</th></tr></thead>
                <tbody>
                    {pageRows.map(p => (
                        <tr key={p.id_proveedor}>
                            <td className="text-gray-500">{p.codigo}</td>
                            <td className="font-medium text-gray-800">{p.nombre}</td>
                            <td className="text-gray-600">{p.rif || '—'}</td>
                            <td className="text-gray-600">{p.categoria || '—'}</td>
                            <td className="text-gray-700">{p.contacto_principal || '—'}</td>
                            <td className="text-gray-600">{p.telefono || '—'}</td>
                            <td>
                                <div className="flex items-center justify-center">
                                    <button className="action-icon" title="Ver" onClick={()=>setViewing(p)}><Ico.eye width="16" height="16" className="text-gray-600"/></button>
                                    {canEdit && <button className="action-icon" title="Editar" onClick={()=>setEditing({...p})}><Ico.edit2 width="16" height="16" className="text-gray-600"/></button>}
                                    {canEdit && <button className="action-icon" title="Eliminar" onClick={()=>setConfirmDel(p)}><Ico.trash width="16" height="16" className="text-gray-600"/></button>}
                                </div>
                            </td>
                        </tr>
                    ))}
                    {pageRows.length===0 && <tr><td colSpan="7" className="text-center py-10 text-gray-400">Sin resultados</td></tr>}
                </tbody>
            </table>
            <Pagination page={page} total={totalPages} onChange={setPage}/>
            {viewing && <ProveedorView p={viewing} onClose={()=>setViewing(null)}/>}
            {editing && <ProveedorForm value={editing} onCancel={()=>setEditing(null)} onSave={save}/>}
            {confirmDel && <ConfirmDialog title="Eliminar Proveedor" msg={`¿Eliminar al proveedor ${confirmDel.nombre}?`} onCancel={()=>setConfirmDel(null)} onConfirm={()=>doDelete(confirmDel)}/>}
        </div>
    );
}

function ProveedorView({ p, onClose }){
    return (
        <div className="modal-backdrop">
            <div className="modal-card">
                <div className="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 className="text-lg font-semibold text-gray-800">Detalle del Proveedor</h3>
                    <button onClick={onClose} className="text-gray-400 hover:text-gray-700"><Ico.close width="20" height="20"/></button>
                </div>
                <div className="p-5 space-y-3">
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Código:</span><span className="font-medium">{p.codigo}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Nombre:</span><span className="font-medium">{p.nombre}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">RIF:</span><span className="font-medium">{p.rif || '—'}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Categoría:</span><span className="font-medium">{p.categoria || '—'}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Contacto:</span><span className="font-medium">{p.contacto_principal || '—'}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Teléfono:</span><span className="font-medium">{p.telefono || '—'}</span></div>
                    <div className="flex justify-between border-b pb-2"><span className="text-sm text-gray-500">Email:</span><span className="font-medium">{p.email || '—'}</span></div>
                    <div className="border-b pb-2"><p className="text-sm text-gray-500 mb-1">Dirección:</p><p className="font-medium text-sm">{p.direccion || '—'}</p></div>
                    {p.notas && <div><p className="text-sm text-gray-500 mb-1">Notas:</p><p className="text-sm bg-gray-50 p-2 rounded whitespace-pre-wrap">{p.notas}</p></div>}
                    <div className="flex justify-between pt-2"><span className="text-sm text-gray-500">Registrado:</span><span className="font-medium">{formatDate(p.fecha_registro)}</span></div>
                    <button onClick={onClose} className="btn-primary w-full justify-center mt-3">Cerrar</button>
                </div>
            </div>
        </div>
    );
}

function ProveedorForm({ value, onCancel, onSave }){
    // Asegurar que el RIF siempre tenga prefijo J- (al cargar valor existente también)
    const initial = { ...value };
    if (initial.rif && !initial.rif.startsWith('J-')) {
        initial.rif = 'J-' + initial.rif.replace(/^J-?/i, '');
    }
    const [f, setF] = useState(initial);
    const set = (k,v) => setF(p => ({...p, [k]:v}));
    const labelStar = (txt) => <>{txt} <span className="text-red-500">*</span></>;

    // RIF: siempre con prefijo J- ; el usuario solo escribe los dígitos
    const onRifChange = (e) => {
        let val = e.target.value;
        // Quitar prefijo "J-" o "j-" si lo escribió
        val = val.replace(/^J-?/i, '');
        // Permitir solo dígitos y guiones (algunas casas escriben J-12345678-9)
        val = val.replace(/[^0-9-]/g, '');
        set('rif', 'J-' + val);
    };

    // Validación de campos obligatorios
    const camposValidos = (
        (f.nombre || '').trim() !== '' &&
        (f.rif || '').trim() !== '' && f.rif !== 'J-' &&
        (f.categoria || '').trim() !== '' &&
        (f.telefono || '').trim() !== '' &&
        (f.direccion || '').trim() !== ''
    );

    function submit(e){
        e.preventDefault();
        if (!camposValidos) return;
        // Garantizar prefijo J- en el envío
        const payload = { ...f };
        if (payload.rif && !payload.rif.startsWith('J-')) {
            payload.rif = 'J-' + payload.rif.replace(/^J-?/i, '');
        }
        onSave(payload);
    }
    return (
        <div className="modal-backdrop">
            <div className="modal-card" style={{maxWidth:680}}>
                <div className="flex items-center justify-between p-5 border-b border-gray-100">
                    <h3 className="text-lg font-semibold text-gray-800">{f.id_proveedor?"Editar Proveedor":"Nuevo Proveedor"}</h3>
                    <button onClick={onCancel} className="text-gray-400 hover:text-gray-700"><Ico.close width="20" height="20"/></button>
                </div>
                <form onSubmit={submit} className="p-5 space-y-3">
                    <div className="grid grid-cols-2 gap-3">
                        <Field label={labelStar("Nombre del Proveedor")}><input value={f.nombre||''} onChange={e=>set("nombre",e.target.value)} className="input-base" required placeholder="Ej: TecnoCom"/></Field>
                        <Field label={labelStar("Rif")}>
                            <input
                                value={f.rif || 'J-'}
                                onChange={onRifChange}
                                className="input-base"
                                required
                                placeholder="J-233425454"
                            />
                        </Field>
                    </div>
                    <Field label={labelStar("Categoría / Rubro")}>
                        <input value={f.categoria||''} onChange={e=>set("categoria",e.target.value)} className="input-base" required placeholder="Ej: Ferretería, Tecnología, Combustibles..."/>
                    </Field>
                    <div className="grid grid-cols-2 gap-3">
                        <Field label="Contacto Principal"><input value={f.contacto_principal||''} onChange={e=>set("contacto_principal",e.target.value)} className="input-base" placeholder="Nombre del contacto (opcional)"/></Field>
                        <Field label={labelStar("Teléfono")}><input value={f.telefono||''} onChange={e=>set("telefono",e.target.value)} className="input-base" required placeholder="04XX-XXXXXXX"/></Field>
                    </div>
                    <Field label="Email"><input type="email" value={f.email||''} onChange={e=>set("email",e.target.value)} className="input-base" placeholder="contacto@empresa.com (opcional)"/></Field>
                    <Field label={labelStar("Dirección")}><input value={f.direccion||''} onChange={e=>set("direccion",e.target.value)} className="input-base" required placeholder="Av., Calle, Ciudad, Estado"/></Field>
                    <Field label="Notas / Observaciones">
                        <textarea rows="3" value={f.notas||''} onChange={e=>set("notas",e.target.value)} className="input-base" placeholder="Información adicional útil para cotizaciones (opcional)..."/>
                    </Field>
                    {!camposValidos && (
                        <p className="text-xs text-red-500 text-center">⚠ Complete todos los campos marcados con <span className="text-red-500 font-bold">*</span></p>
                    )}
                    <div className="flex items-center gap-3 pt-3">
                        <button type="button" onClick={onCancel} className="flex-1 btn-outline">Cancelar</button>
                        <button type="submit" disabled={!camposValidos} className="flex-1 btn-primary justify-center" style={!camposValidos ? {opacity:0.5, cursor:'not-allowed'} : {}}>Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    );
}

// COMPONENTES AUXILIARES

function StatCardSmall({ icon, bg, val, label, color }){
    return (
        <div className="stat-card">
            <div className="stat-icon" style={{background:bg}}>{icon}</div>
            <div>
                <div className="text-2xl font-bold" style={{color}}>{val}</div>
                <div className="text-sm text-gray-500">{label}</div>
            </div>
        </div>
    );
}
function Field({ label, children }){
    return (<label className="block"><span className="text-sm text-gray-600 mb-1 block">{label}</span>{children}</label>);
}
function SelectField({ value, onChange, options, icon }){
    return (
        <div className="relative">
            {icon && <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{icon}</div>}
            <select value={value} onChange={e=>onChange(e.target.value)} className={"input-base appearance-none pr-10 "+(icon?"pl-9":"")}>
                {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
            </select>
            <div className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"><Ico.chevronDown width="14" height="14"/></div>
        </div>
    );
}
function SearchField({ value, onChange, placeholder }){
    return (
        <div className="relative">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Ico.search width="16" height="16"/></div>
            <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"Buscar..."} className="input-base pl-9"/>
        </div>
    );
}
function Pagination({ page, total, onChange }){
    if (total<=1) return null;
    const pages = [];
    for (let i=1; i<=Math.min(total,5); i++) pages.push(i);
    return (
        <div className="flex items-center gap-1 px-5 py-3 border-t border-gray-100">
            <button className="page-btn" onClick={()=>onChange(Math.max(1,page-1))}><Ico.chevronLeft width="14" height="14"/></button>
            {pages.map(p => <button key={p} className={"page-btn "+(p===page?"active":"")} onClick={()=>onChange(p)}>{p}</button>)}
            <button className="page-btn" onClick={()=>onChange(Math.min(total,page+1))}><Ico.chevronRight width="14" height="14"/></button>
        </div>
    );
}
function ConfirmDialog({ title, msg, onCancel, onConfirm }){
    return (
        <div className="modal-backdrop">
            <div className="modal-card" style={{maxWidth:420}}>
                <div className="p-6">
                    <div className="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mb-4 mx-auto">
                        <Ico.trash width="22" height="22" className="text-red-500"/>
                    </div>
                    <h3 className="text-lg font-semibold text-gray-800 mb-2 text-center">{title}</h3>
                    <p className="text-sm text-gray-600 text-center mb-5">{msg}</p>
                    <div className="flex items-center gap-3">
                        <button onClick={onCancel} className="flex-1 btn-outline">Cancelar</button>
                        <button onClick={onConfirm} className="flex-1 py-2.5 px-4 rounded-md font-medium text-white" style={{background:"#ef4444"}}>Confirmar</button>
                    </div>
                </div>
            </div>
        </div>
    );
}
function LoadingPane(){
    return (<div className="flex items-center justify-center py-20"><div className="spinner"></div><span className="ml-3 text-gray-500">Cargando...</span></div>);
}
function LoadingSpinner({ mensaje }){
    return (
        <div className="flex flex-col items-center justify-center py-20">
            <div className="spinner" style={{width:48, height:48, borderWidth:5}}></div>
            <p className="mt-4 text-sm text-gray-500">{mensaje || "Cargando..."}</p>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
